name: Build Verilator Images

on:
  push:
    branches:
      - master
    paths:
      - 'tools/verilator/**'
      - '.github/workflows/build-tool-verilator.yaml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/dockyard-verilator

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    # This matrix defines the version tags you want to build. 
    # Just add a new string here to create a new version build.
    strategy:
      matrix:
        version: ['v5.048']
      fail-fast: false

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # This is the key matrixed step of the build. The git tag to checkout is
      # passed via VERILATOR_TAG to the Docker build. The git tag is defined by
      # the matrix above.
      - name: Build and Push Image
        uses: docker/build-push-action@v7
        with:
          context: tools/verilator
          push: true
          build-args: |
            VERILATOR_TAG=${{ matrix.version }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.version }}
          cache-from: type=gha,scope=verilator-${{ matrix.version }}
          cache-to: type=gha,mode=max,scope=verilator-${{ matrix.version }}